<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MindScribe 321</title>

  <!-- ui layer-->
  <link rel="stylesheet" href="style.css">

  <!-- d3 used by ui layer to render -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- tinymce self host -->
  <script src="js/tinymce/tinymce.min.js"></script>

  <!-- firebase for persistence  -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>

<body>

  <!-- title-->
  <h1 id="title">
    MindScribe 321
    <div id="title-actions">
      <span id="save-status"></span>
      <button id="save-btn" class="btn btn-outline">Save</button>
      <button id="export-btn" class="btn btn-solid">Export</button>
    </div>
  </h1>

  <!-- main layout -->
  <div class="editor-layout">

    <!-- left: tinyMCE editor (ui layer) -->
    <div class="left-panel">
      <textarea id="editor-textarea" placeholder="Welcome to MindScribe 321! Add headings to build your mind map."></textarea>
    </div>

    <!-- right: d3 mind map (UI Layer) -->
    <div class="right-panel">
      <div id="mindmap"></div>
    </div>

  </div>

  <!-- export/share function -->
  <div id="export-modal">
    <div class="modal-box">
      <h2>Export</h2>
      <p>Choose how you'd like to export your mind map.</p>

      <div class="export-options">

        <button id="export-png-btn" class="export-option-btn">
          <span class="icon">🖼️</span>
          <div>
            <div class="label">Export as PNG</div>
            <div class="desc">Download the mind map as an image file</div>
          </div>
        </button>

        <button id="export-json-btn" class="export-option-btn">
          <span class="icon">📄</span>
          <div>
            <div class="label">Export as JSON</div>
            <div class="desc">Download the mind map structure as JSON data</div>
          </div>
        </button>

      </div>

      <div class="modal-footer">
        <button id="modal-close-btn" class="btn-cancel">Close</button>
      </div>
    </div>
  </div>

  <!-- java script loading in dependency order  -->

  <!-- application layer: business logic (no dependencies) -->
  <script src="mindmapService.js"></script>

  <!-- persistence, firebase layer using firebase SDK -->
  <script src="firebaseService.js"></script>

  <!-- ui layer -->
  <script src="ui.js"></script>

</body>
</html>
