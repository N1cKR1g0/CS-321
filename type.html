<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MindScribe 321</title>

  <!-- UI Layer: Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- D3 — used by UI layer for rendering -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- TinyMCE — self-hosted local copy -->
  <script src="js/tinymce/tinymce.min.js"></script>

  <!-- Firebase — used by Persistence layer -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>

<body>

  <!-- ── Title Bar ──────────────────────────────────────────────── -->
  <h1 id="title">
    MindScribe 321
    <div id="title-actions">
      <span id="save-status"></span>
      <button id="save-btn" class="btn btn-outline">Save</button>
      <button id="export-btn" class="btn btn-solid">Export / Share</button>
    </div>
  </h1>

  <!-- ── Main Layout ────────────────────────────────────────────── -->
  <div class="editor-layout">

    <!-- Left: TinyMCE Editor (UI Layer) -->
    <div class="left-panel">
      <textarea id="editor-textarea">Welcome to MindScribe 321! Add headings to build your mind map.</textarea>
    </div>

    <!-- Right: D3 Mind Map (UI Layer) -->
    <div class="right-panel">
      <div id="mindmap"></div>
    </div>

  </div>

  <!-- ── Export / Share Modal ───────────────────────────────────── -->
  <div id="export-modal">
    <div class="modal-box">
      <h2>Export &amp; Share</h2>
      <p>Choose how you'd like to export or share your mind map.</p>

      <div class="export-options">

        <button id="export-png-btn" class="export-option-btn">
          <span class="icon">🖼️</span>
          <div>
            <div class="label">Export as PNG</div>
            <div class="desc">Download the mind map as an image file</div>
          </div>
        </button>

        <button id="export-json-btn" class="export-option-btn">
          <span class="icon">📄</span>
          <div>
            <div class="label">Export as JSON</div>
            <div class="desc">Download the mind map structure as JSON data</div>
          </div>
        </button>

        <button id="export-share-btn" class="export-option-btn">
          <span class="icon">🔗</span>
          <div>
            <div class="label">Get Share Link</div>
            <div class="desc">Save and generate a link anyone can open</div>
          </div>
        </button>

      </div>

      <!-- Share link area (shown after generating) -->
      <div id="share-link-area">
        <label>Shareable Link</label>
        <input id="share-link-input" type="text" readonly>
        <button id="copy-link-btn">Copy Link</button>
      </div>

      <div class="modal-footer">
        <button id="modal-close-btn" class="btn-cancel">Close</button>
      </div>
    </div>
  </div>

  <!-- ── JavaScript: Load in dependency order ───────────────────── -->

  <!-- Application Layer: Business Logic (no dependencies) -->
  <script src="mindmapService.js"></script>

  <!-- Persistence Layer: Firebase access (depends on Firebase SDK) -->
  <script src="firebaseService.js"></script>

  <!-- UI Layer: Wires everything together (depends on both above) -->
  <script src="ui.js"></script>

</body>
</html>
